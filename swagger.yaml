openapi: 3.0.3
info:
  title: Natural Language Querying API
  version: 1.0.0
  description: >
    API para consultas analíticas en lenguaje natural con persistencia de conversaciones,
    reglas globales y reglas por cliente. Autenticación vía JWT y permisos de cubos/producto
    vía API Launcher (sin rol de aplicación en la mayoría de rutas). El rol super_admin
    solo aplica al módulo de administración de reglas (alta/edición/baja de reglas globales y
    por cliente, y proxy de listado/detalle de clientes para ese flujo).
servers:
  - url: /
    description: Servidor activo (la URL real se inyecta desde PUBLIC_URL al arrancar)

tags:
  - name: Ask
    description: Consulta analítica directa (sin persistencia de conversación)
  - name: Chat
    description: Conversaciones persistidas y mensajes
  - name: Global Rules
    description: Reglas globales (lectura autenticados; alta/edición/baja solo super_admin)
  - name: Config
    description: Configuración pública para el frontend
  - name: Auth
    description: Perfil del usuario (Launcher); cualquier usuario autenticado - no exige super_admin
  - name: Customer Rules
    description: Reglas por cliente Launcher (solo super_admin)
  - name: Admin Customers
    description: Proxy de clientes del Launcher (solo super_admin)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        error:
          type: string
        message:
          type: string
      additionalProperties: true

    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, created_at, updated_at]

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        payload:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, conversation_id, role, content, created_at]

    MappedMeasure:
      type: object
      properties:
        technical_name:
          type: string
        friendly_name:
          type: string
        mdx_unique_name:
          type: string
      required: [technical_name, friendly_name, mdx_unique_name]

    MappedFilter:
      type: object
      properties:
        type:
          type: string
          enum: [year, month, dimension]
        hierarchy_mdx:
          type: string
        friendly_name:
          type: string
        values:
          type: array
          items:
            type: string
      required: [type, hierarchy_mdx, friendly_name, values]

    CatalogSelection:
      type: object
      properties:
        reasoning:
          type: string
        cube_name:
          type: string
        measures:
          type: array
          items:
            $ref: "#/components/schemas/MappedMeasure"
        filters:
          type: array
          items:
            $ref: "#/components/schemas/MappedFilter"
      additionalProperties: true

    FilterTuple:
      type: object
      properties:
        dimension_friendly:
          type: string
        dimension_mdx:
          type: string
        value_caption:
          type: string
        member_unique_name:
          type: string
      required: [dimension_friendly, dimension_mdx, value_caption, member_unique_name]

    MeasureResult:
      type: object
      properties:
        technical_name:
          type: string
        friendly_name:
          type: string
        cube_name:
          type: string
        mdx:
          type: string
        value:
          type: string
          nullable: true
        catalog:
          type: string
        filter_combo:
          type: array
          items:
            $ref: "#/components/schemas/FilterTuple"
        filter_label:
          type: string
      required:
        - technical_name
        - friendly_name
        - cube_name
        - mdx
        - catalog
        - filter_combo
        - filter_label

    AskData:
      type: object
      properties:
        value:
          type: string
          nullable: true
        cube:
          type: string
          nullable: true
        measure:
          type: string
          nullable: true
        mdx:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/MeasureResult"
        selection:
          $ref: "#/components/schemas/CatalogSelection"
      required: [results, selection]

    AskResponse:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
        answer_html:
          type: string
          nullable: true
        chart_data:
          type: object
          nullable: true
          description: Compatibilidad legacy para gráficos simples.
          properties:
            type:
              type: string
              enum: [bar, line, pie]
            labels:
              type: array
              items: { type: string }
            datasets:
              type: array
              items:
                type: object
                properties:
                  label: { type: string }
                  data:
                    type: array
                    items: { type: number }
                required: [label, data]
        chart_spec:
          type: object
          nullable: true
          description: Especificación de visualización dinámica (Vega-Lite).
          properties:
            kind:
              type: string
              enum: [vega-lite]
            spec:
              type: object
              additionalProperties: true
            meta:
              type: object
              properties:
                title: { type: string }
                subtitle: { type: string }
                notes:
                  type: array
                  items: { type: string }
          required: [kind, spec]
        data:
          $ref: "#/components/schemas/AskData"
      required: [question, answer, data]

    ChatAskResponse:
      allOf:
        - $ref: "#/components/schemas/AskResponse"
        - type: object
          properties:
            conversation_id:
              type: string
              format: uuid
          required: [conversation_id]

    GlobalRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        content:
          type: string
        is_active:
          type: boolean
        priority:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, content, is_active, priority, created_at, updated_at]

    ApiConfigResponse:
      type: object
      properties:
        api_base_url:
          type: string
        product_id:
          type: string
          nullable: true
      required: [api_base_url]

    AuthMeUser:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        username: { type: string, nullable: true }
        role: { type: string }
        customerId: { type: string, nullable: true }
        products:
          type: array
          items: { type: string }
      required: [id, email, role]

    AuthMeResponse:
      type: object
      description: >
        Disponible para cualquier usuario autenticado. Los flags can_manage_* son true solo
        si user.role es super_admin (para decidir si mostrar el módulo de reglas en el front).
      properties:
        user:
          $ref: "#/components/schemas/AuthMeUser"
        can_manage_global_rules:
          type: boolean
          description: true solo si super_admin — gestión de reglas globales
        can_manage_customer_rules:
          type: boolean
          description: true solo si super_admin — gestión de reglas por cliente
        canManageRules:
          type: boolean
          description: Alias útil para la UI (típicamente igual que super_admin en este producto)
      required: [user, can_manage_global_rules, can_manage_customer_rules, canManageRules]

    CustomerRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id: { type: string }
        name: { type: string }
        content: { type: string }
        is_active: { type: boolean }
        priority: { type: integer }
        created_by_user_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, customer_id, name, content, is_active, priority, created_at, updated_at]

    CustomerRuleCreateRequest:
      type: object
      required: [customer_id, name, content]
      properties:
        customer_id: { type: string }
        name: { type: string }
        content: { type: string }
        is_active: { type: boolean, default: true }
        priority: { type: integer, default: 100 }

    CustomerRulePatchRequest:
      type: object
      properties:
        name: { type: string }
        content: { type: string }
        is_active: { type: boolean }
        priority: { type: integer }

paths:
  /ask:
    post:
      tags: [Ask]
      summary: Ejecuta una consulta analítica directa
      description: >
        Requiere token válido y permiso de producto en el Launcher (ID_CUBE). No evalúa rol super_admin.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  description: Pregunta del usuario
                user_prompt:
                  type: string
                  description: Alias legacy de question
              anyOf:
                - required: [question]
                - required: [user_prompt]
      responses:
        "200":
          description: Respuesta de la consulta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"
        "400":
          description: Request inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para este producto (Launcher)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chat/conversations:
    get:
      tags: [Chat]
      summary: Lista conversaciones
      description: Usuario autenticado; no requiere rol super_admin.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Conversaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conversation"
                required: [conversations]
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Chat]
      summary: Crea conversación
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        "201":
          description: Conversación creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: "#/components/schemas/Conversation"
                required: [conversation]
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chat/conversations/{id}:
    delete:
      tags: [Chat]
      summary: Elimina una conversación y sus mensajes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conversación eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                    format: uuid
                required: [ok, id]
        "404":
          description: Conversación no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chat/conversations/{id}/messages:
    get:
      tags: [Chat]
      summary: Lista mensajes de una conversación
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mensajes de la conversación
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                required: [messages]
        "400":
          description: ID inválido/faltante
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chat/ask:
    post:
      tags: [Chat]
      summary: Ejecuta pregunta en conversación persistida
      description: >
        Permiso de producto vía Launcher (403 si no). No requiere rol super_admin.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  format: uuid
                  description: Si no se envía, el backend crea una nueva conversación
                question:
                  type: string
                user_prompt:
                  type: string
              anyOf:
                - required: [question]
                - required: [user_prompt]
      responses:
        "200":
          description: Respuesta con persistencia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatAskResponse"
        "400":
          description: Request inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para este producto (Launcher)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/global-rules:
    get:
      tags: [Global Rules]
      summary: Lista reglas globales
      description: Lectura para cualquier usuario autenticado (no exige super_admin).
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Reglas
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      $ref: "#/components/schemas/GlobalRule"
                required: [rules]
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Global Rules]
      summary: Crea una regla global
      description: Solo rol super_admin (módulo reglas).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, content]
              properties:
                name:
                  type: string
                content:
                  type: string
                is_active:
                  type: boolean
                  default: true
                priority:
                  type: integer
                  default: 100
      responses:
        "201":
          description: Regla creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: "#/components/schemas/GlobalRule"
                required: [rule]
        "400":
          description: Request inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Prohibido — requiere rol super_admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/global-rules/{id}:
    patch:
      tags: [Global Rules]
      summary: Actualiza una regla global
      description: Solo rol super_admin (módulo reglas).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                content:
                  type: string
                is_active:
                  type: boolean
                priority:
                  type: integer
      responses:
        "200":
          description: Regla actualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: "#/components/schemas/GlobalRule"
                required: [rule]
        "400":
          description: Request inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Regla no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Prohibido — requiere rol super_admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Global Rules]
      summary: Elimina una regla global
      description: Solo rol super_admin (módulo reglas).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Regla eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                    format: uuid
                required: [ok, id]
        "404":
          description: Regla no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Prohibido — requiere rol super_admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/config:
    get:
      tags: [Config]
      summary: URL base de la API y product_id canónico
      description: Público. Comparar product_id con el parámetro _u del Launcher si aplica.
      security: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiConfigResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Perfil del usuario (Launcher)
      description: >
        Cualquier usuario autenticado. Devuelve datos del usuario y flags booleanos para
        mostrar u ocultar el módulo de reglas (solo si super_admin). No requiere rol super_admin para llamar.
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Perfil no disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/customer-rules:
    get:
      tags: [Customer Rules]
      summary: Lista reglas por customer_id (Launcher)
      description: Solo rol super_admin (módulo reglas).
      security:
        - BearerAuth: []
      parameters:
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerRule"
                required: [rules]
        "400":
          description: Falta customer_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Prohibido — requiere rol super_admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Customer Rules]
      summary: Crea regla de cliente (valida producto NLQ en Launcher)
      description: Solo rol super_admin (módulo reglas).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRuleCreateRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: "#/components/schemas/CustomerRule"
                required: [rule]
        "400":
          description: Request inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >
            Sin rol super_admin; o el cliente no tiene el producto NLQ en el Launcher
            (error CUSTOMER_NO_NLQ_PRODUCT en cuerpo).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/customer-rules/{id}:
    patch:
      tags: [Customer Rules]
      summary: Actualiza regla de cliente
      description: Solo rol super_admin (módulo reglas).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRulePatchRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: "#/components/schemas/CustomerRule"
                required: [rule]
        "400":
          description: Request inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autorizado
          content:
